name: release

# Cut a release by pushing a semver tag:
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# This builds `stella` natively for each supported platform, tars each
# binary with a per-file SHA-256, and attaches them to the GitHub Release
# that install.sh (https://oxagen.sh/install) downloads from.
#
# We build natively (never cross-compile) because stella-store bundles
# DuckDB, a heavy C++ dependency whose cross toolchains are painful — a
# native runner per target is simpler and reliable.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked -p stella-cli --target ${{ matrix.target }}

      - name: Package tarball + checksum
        shell: bash
        run: |
          set -euo pipefail
          bin="target/${{ matrix.target }}/release/stella"
          test -f "$bin"
          asset="stella-${{ matrix.target }}.tar.gz"
          # Archive the bare binary at the root so install.sh finds ./stella.
          tar -czf "$asset" -C "target/${{ matrix.target }}/release" stella
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" | cut -d' ' -f1 > "$asset.sha256"
          else
            shasum -a 256 "$asset" | cut -d' ' -f1 > "$asset.sha256"
          fi
          ls -l "$asset" "$asset.sha256"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stella-${{ matrix.target }}
          path: |
            stella-${{ matrix.target }}.tar.gz
            stella-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lR dist

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            dist/stella-*.tar.gz
            dist/stella-*.tar.gz.sha256
