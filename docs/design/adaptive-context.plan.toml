[[tasks]]
id = "t04-core-extractors"
title = "Pure observation extractors, redaction, idempotency in stella-core"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read sections 8.2, 10.1-10.3, and 14, plus
AGENTS.md; stella-core does NO I/O — pure functions over owned data only).

Earlier tasks landed record types (stella-protocol/src/context_lifecycle.rs)
and the lifecycle policy module (stella-core/src/lifecycle/). Build on them.

Deliver, in stella-core/src/lifecycle/ (new submodule, e.g. extract.rs):

1. The extractor contract from RFC 10.2 as a pure trait: given typed source
   records, emit zero or more normalized Observations; every emission carries
   a source cursor reference, an evidence locator, an idempotency key,
   sensitivity, and an initial sharing scope (default personal). Extractors
   must distinguish direct evidence from model inference and must never turn
   agent prose into a directive.
2. Pure normalizers for each v1 source: AgentEvent streams (tool_failure /
   tool_recovery / verification_pass / verification_failure from
   ToolResult, JudgeVerdict, and pipeline stage events); reflection lessons
   (the .stella/reflections.jsonl record shape: lesson, domains,
   occurred_at); explicit user actions (keep/edit/ignore/acceptance/
   rejection/correction); and git-diff FEATURES (the I/O half that produces
   the features lives in the CLI — here you take an already-computed
   feature struct: files added after the agent stopped, tests added
   alongside changes, repeated renames, restored variants, removed generated
   output — and interpret it CONSERVATIVELY per RFC 10.3: a follow-up edit
   is an inferred observation, never a verified error; merge commits,
   formatting-only churn, generated and vendor paths are excluded via pure
   predicates over the provided path lists).
3. Deterministic idempotency-key derivation (content hash over source ref +
   cursor position — replaying identical input yields identical keys).
4. Secret redaction as a pure function over text (conservative pattern set:
   common API key/token/secret shapes), applied before any excerpt lands in
   an Observation or Evidence; unit-test the patterns both ways.
5. Distinct-task attribution helpers (one execution id = one task) and
   rate-limit decisions (max candidates per task and per session, RFC 10.5).

Property tests: normalizers are deterministic; same input twice yields
identical observations and keys; N repeated events within one execution
never produce a distinct-task count above 1.

Run: cargo test -p stella-core && cargo fmt && cargo clippy -p stella-core
--all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-core): observation extractors,
redaction, idempotency". Reconcile with already-landed work.
'''
depends_on = ["t02-core-policy"]
claims = ["stella-core/src/lib.rs"]

[[tasks]]
id = "t05-cli-settings"
title = "context governance section in .stella/settings.json"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read section 11.1; and AGENTS.md).

Deliver, in stella-cli/src/settings.rs (follow its existing three-scope
per-field merge exactly — user, org-managed, project; project wins):

1. A new optional top-level `context` section: governance.mode
   ("solo" | "team" | "regulated"); promotion.inferred_rule
   { min_observations (default 3), min_distinct_tasks (default 3),
   advisory_at_confidence (default 85 — deliberately renamed from the RFC's
   auto_publish_at_confidence; doc-comment the rename: advisory activation
   never writes rule files, see plan decision D4), initial_enforcement
   (default "advisory") }; promotion.blocking_rule
   { requires_explicit_confirmation (default true) }; retention
   { raw_observation_days 30, candidate_days 30, stale_directive_days 180 }.
2. THE FEATURE FLAG: an absent `context` section means the entire adaptive
   context lifecycle is disabled — harvesting, mining, frame compilation,
   notices all inert, zero behavior change for existing users. Expose a
   clean `is_enabled()` accessor other tasks will consult.
3. Conversion into the stella-core lifecycle config types (from
   stella-core/src/lifecycle/, committed earlier), with mode "team" and
   "regulated" parsing successfully but surfacing core's typed
   NotYetSupported when exercised.
4. Tests: serde defaults; per-field 3-scope merge (project overrides one
   field, user supplies the rest); unknown-field tolerance consistent with
   the file's existing behavior; absent-section => disabled.

Run: cargo test -p stella-cli settings && cargo fmt && cargo clippy -p
stella-cli --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-cli): context governance settings
section". Reconcile with already-landed work.
'''
depends_on = ["t01-protocol-records"]
claims = ["stella-cli/src/settings.rs"]

[[tasks]]
id = "t06-cli-harvest"
title = "Observation harvesting + stella context inspection commands"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read sections 10.1, 15.3, 15.4, 16.3, plus
AGENTS.md). Earlier tasks landed: record types (stella-protocol), pure
extractors + policy (stella-core/src/lifecycle/), lifecycle storage + cursors
(stella-context), and the `context` settings section with is_enabled()
(stella-cli/src/settings.rs). Build on all of them; if a seam is missing,
stop and report the gap in your summary.

Deliver:

1. In stella-store (keep the diff small; if the file-size ratchet blocks
   stella-store/src/lib.rs, put the new API in a new module): an incremental
   cursored event read styled on the existing session_events query — return
   events strictly after an (execution_id, seq) cursor in order. The events
   table's AUTOINCREMENT execution_id + per-execution seq + UNIQUE
   constraint make this safe. Unit tests included. Note: no such API exists
   today; session_events reads whole sessions.
2. In stella-cli, a harvest orchestrator (new file, e.g.
   src/context_harvest.rs): read store.db events via the new cursor API,
   the session journal sidecar when present, and .stella/reflections.jsonl
   (compatibility input); feed the stella-core normalizers; persist
   observations idempotently via the stella-context repositories, advancing
   one extraction_cursor per source. Harvest is BEST-EFFORT and BOUNDED
   (wall-clock cap; on overrun, save the cursor and stop — the next pass
   resumes); it must never fail or block the primary task (RFC 16.3), and it
   runs only when settings context.is_enabled().
3. Wire an incremental harvest invocation at the existing post-turn boundary
   next to the reflect_and_record call sites in stella-cli/src/memory.rs
   (same best-effort discipline that reflection already uses).
4. New `stella context` subcommand (new file src/context_cmd.rs + the
   Command enum arm in src/main.rs): `status` (mode, counts by record type,
   cursor positions), `observations` (list, newest first, --format
   table|json like memory_cmd), `explain <id>` (one record + its evidence
   chain), `harvest [--from <cursor>]` (explicit full pass, ignores the
   wall-clock cap).
5. Tests: harvesting twice over the same sources produces zero duplicate
   observations (idempotent replay — RFC 20.1); repeated events within one
   execution do not inflate distinct-task counts; disabled feature => the
   post-turn hook is a no-op.

Run: cargo test -p stella-cli -p stella-store && cargo fmt && cargo clippy
-p stella-cli -p stella-store --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-cli): observation harvesting + stella
context inspection commands". Reconcile with already-landed work.
'''
depends_on = ["t03-context-schema", "t04-core-extractors", "t05-cli-settings"]
claims = [
  "stella-cli/src/main.rs",
  "stella-cli/src/memory.rs",
  "stella-cli/src/context_cmd.rs",
  "stella-cli/src/context_harvest.rs",
  "stella-store/src/lib.rs",
]

[[tasks]]
id = "t07-git-mining"
title = "Conservative git-diff observation mining"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read section 10.3 closely; its
conservatism rules are the point of this task; plus AGENTS.md). Earlier
tasks landed the harvest orchestrator (stella-cli/src/context_harvest.rs),
the `stella context` command (src/context_cmd.rs), and the pure git-feature
interpreter in stella-core/src/lifecycle/ that consumes an
already-computed feature struct. Your job is the I/O half.

Deliver, in stella-cli (new file, e.g. src/context_git.rs):

1. A git evidence source that computes the RFC 10.3 features by comparing
   the agent's last known state with the accepted repository state:
   working-tree and staged diffs, and commits since the per-repo mining
   cursor. Derive: files the user added after the agent stopped; tests
   added alongside repeated categories of change; files repeatedly renamed
   or reorganized; formatting or asset variants repeatedly restored;
   generated output removed before acceptance; final commit shape vs the
   agent's last patch. Store base and head shas in the Evidence locator.
2. Conservatism is mandatory: every git-derived observation is
   assessment-level INFERRED, never verified (RFC 14.2 — a later edit means
   the output changed, not that it was wrong); merge commits,
   formatting-only churn (whitespace-dominant hunks), gitignored, generated,
   and vendor paths are filtered before feature extraction; changes
   unrelated to the agent's touched files are excluded.
3. Bounds: hard caps on bytes and file count per pass plus a wall-clock
   budget; on overrun, persist the cursor (last mined commit sha) and stop
   cleanly. Feature-gated on context.is_enabled().
4. Spawn git through the workspace's existing non-interactive plumbing —
   reuse the established spawn point (stella_fleet::SystemGitCli or the repo
   tools port; copy the pattern the tree already uses, do not invent a new
   Command call site).
5. Integrate: part of the normal harvest pass, plus `stella context harvest
   --git` for an explicit deep pass (flag added in context_cmd.rs).
6. Tests against a tempdir fixture repo (the fleet/candidate_ws tests show
   the idiom): follow-up-edit scenario yields an inferred observation;
   formatting-only commit yields nothing; re-running with an advanced cursor
   yields nothing new.

Run: cargo test -p stella-cli && cargo fmt && cargo clippy -p stella-cli
--all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-cli): conservative git-diff observation
mining". Reconcile with already-landed work.
'''
depends_on = ["t06-cli-harvest"]
claims = [
  "stella-cli/src/context_git.rs",
  "stella-cli/src/context_harvest.rs",
  "stella-cli/src/context_cmd.rs",
]

