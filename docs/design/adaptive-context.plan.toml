[[tasks]]
id = "t09-frame-compiler"
title = "Deterministic compiled context frame + manifest in stella-context"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read sections 6.6, 9, and 19, plus
AGENTS.md; determinism and byte-stability are the acceptance bar here).
Already committed: lifecycle storage + as-of queries (stella-context), the
precedence comparator + conflict types (stella-core/src/lifecycle/), record
types (stella-protocol). Build on them.

Deliver, in stella-context (new module, e.g. src/frame_compiler.rs):

1. CompiledContextFrame assembly implementing RFC 9.2 steps 4-11 for the
   v1 record set: select directives whose scope matches and whose temporal
   interval contains as_of_valid_at, considering only records visible by
   as_of_observed_at (the as-of queries landed earlier); split kind=memory
   directives into the memories presentation section KEEPING their directive
   ids (RFC 6.3 — no second memory source of truth); include matched
   artifact contracts; include observation summaries only as clearly
   labeled evidence with no instruction capability (RFC 8.2/9.4 — the frame
   type carries an instruction-capability label per section); resolve
   conflicts through the core comparator, recording every conflict decision
   in the manifest, never silently merging; dedupe, then pack to the token
   budget reusing the crate's existing estimation + packing idioms
   (pack_to_budget / MMR patterns in retrieval.rs).
2. Every included item carries a mandatory citation_label (the crate's L-C4
   discipline — constructor-enforced, absent label is a typed error) and a
   selection_reason.
3. A byte-stable manifest: compiler_version const, input_hash (sha256 over
   the canonical serialization of all inputs: task, scope, cutoffs, budget,
   included-record content hashes, config), token budget used/max, included
   ids, excluded ids with reasons, conflict records. Stable total ordering
   throughout so identical inputs yield a byte-identical serialized frame
   (RFC 19).
4. Persist frame + items through the immutable frame storage landed
   earlier. Compilation is pure read + assemble: no model calls, no
   embedding writes.
5. Tests: determinism property test (same inputs, shuffled row order in
   => byte-identical frame out); as-of correctness (a record learned after
   the observation cutoff is excluded; a record invalid at the validity
   cutoff is excluded — RFC 15.2's as-of test requirement); memories keep
   directive ids; conflicts always recorded; over-budget inputs drop
   lowest-precedence items with excluded reasons, never silently.

Run: cargo test -p stella-context && cargo fmt && cargo clippy -p
stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): deterministic compiled
context frame + manifest". Reconcile with already-landed work.
