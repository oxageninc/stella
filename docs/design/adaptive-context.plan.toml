[[tasks]]
id = "t08-solo-ladder"
title = "Solo advisory ladder: keep/edit/ignore + confirmed-rule materialization"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read sections 11.2, 11.5, 12, 13.1, 16.3,
plus AGENTS.md). Everything below builds on already-committed work: core
governance/scoring/ladder (stella-core/src/lifecycle/), candidate storage
(stella-context), harvesting + `stella context` commands (stella-cli). If a
seam is missing, stop and report the gap.

Deliver:

1. Candidate induction wiring: after each bounded harvest pass (and during
   `stella context harvest`), run the core clustering + scoring over
   fresh observations and persist candidates with their stored score
   components; enforce core's rate limits; detect contradictions before
   promotion eligibility. When a candidate crosses the solo thresholds it
   becomes ADVISORY: active in context.db, eligible for frame inclusion —
   and nothing else. Print the RFC 11.2-style one-line notice at the end of
   the turn (the full TUI card is another task's).
2. Commands in src/context_cmd.rs (+ main.rs arms): `candidates` (list with
   scores and distinct-task counts), extend `explain <id>` to show score
   components + observation ids, `keep <id>`, `edit <id> --statement <text>`
   (superseding user-authored directive preserving candidate evidence;
   require the flag rather than an interactive editor so the command is
   headless-safe), `ignore <id>` (rejected + cooldown + negative evidence),
   `share <id> --scope repository` (explicit personal->repository
   promotion; sharing NEVER happens implicitly — RFC 11.5), `archive <id>`
   (reversible; respect core's never-archive exclusions).
3. Materialization (plan decision D4 — the trust boundary of this whole
   feature): ONLY a directive that is (a) explicitly confirmed via Keep or
   authored via Edit, AND (b) repository-scoped via share, is rendered to
   .stella/rules/<slug>.md using stella-core's render_rule_markdown with the
   extended canonical snake_case frontmatter. Advisory or personal
   directives must NEVER produce a file. Witness test: an advisory-only
   candidate leaves .stella/rules/ untouched (this test fails if someone
   later wires auto-materialization).
4. Unify the existing citation ladder (plan decision D1): `stella memory
   promote <id>` in src/memory_cmd.rs now delegates to the candidate ladder
   — its citation stats enter as the citation-health score component, and
   the explicit user invocation counts as confirmation (an accelerated
   Keep). Preserve the existing command surface and its strict eligibility
   as an alias with a deprecation note in the help text; behavior for a
   memory that meets the old bar must remain: a rule file appears.
5. Tests including the RFC 20.3 witnesses that are now testable: (#1) three
   observations across three distinct tasks create exactly one advisory
   candidate and one notice; (#2) repeated events in one task never cross
   the threshold; (#3) a blocking candidate always requires explicit
   confirmation (core enforces; prove end-to-end); (#4) a personal
   preference never appears in any git-visible file.

Run: cargo test -p stella-cli && cargo fmt && cargo clippy -p stella-cli
--all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-cli): solo advisory ladder —
keep/edit/ignore + confirmed-rule materialization". Reconcile with
