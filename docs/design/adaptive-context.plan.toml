# ============================================================================
# Adaptive Context Lifecycle — stella-fleet implementation plan
#
# Companion to docs/design/adaptive-context.md (the RFC). This file is a
# `stella fleet` plan: it deserializes into `stella_fleet::Plan`
# ([[tasks]] with id / title / prompt / depends_on / isolation / claims).
#
# HOW TO RUN
#   git checkout -b feat/adaptive-context   # shared-tree commits land on the
#                                           # CURRENT branch — use a feature
#                                           # branch, never main
#   stella fleet --plan docs/design/adaptive-context.plan.toml \
#     --max-concurrency 3 --budget 120
#
#   - Every task is shared-tree (warm build cache; commits interleave on the
#     one branch). Same-crate tasks are serialized via depends_on, so claims
#     never conflict inside this plan; declared claims still guard against
#     OTHER fleets/deck sessions in the same workspace.
#   - The per-child budget is --budget / --max-concurrency. 120/3 = $40 per
#     task cap; the fleet stops launching waves once the metered total
#     crosses $120.
#   - The fleet has NO resume: a failed task permanently skips its
#     dependents for that run, and a re-run re-dispatches everything. Every
#     prompt therefore instructs the worker to RECONCILE with already-landed
#     work instead of duplicating it, so re-runs converge.
#
# SCOPE — what this plan builds (and deliberately does not)
#   Builds: RFC Phases 0-3 (schema + lineage, local observations, solo
#   advisory learning, artifact contracts) plus TUI, Observatory, docs, and a
#   final gate task. This is the complete SOLO product.
#   Defers (each needs its own future plan, per the RFC's own sequencing):
#     - Phase 4 team governance (Context PRs via Git, owner routing)
#     - Phase 5 context-graph-protocol lifecycle extension (blocked anyway:
#       Stella still depends on the pre-rename `opencontextprotocol` repo as
#       ocp-types/ocp-host @ a pinned rev; repointing to the renamed
#       context-graph-protocol repo is a prerequisite)
#     - Phase 6 efficacy dashboards / matched-control analysis
#     - regulated mode (config parses; returns a typed NotYetSupported error)
#
# DECISIONS ENCODED (resolutions of the review pushback; each is localized to
# the tasks named, so overruling one means editing only those prompts)
#   D1 unify learning surfaces: context.db memory rows migrate to
#      kind=memory directives (t03); `stella memory promote` delegates to the
#      one candidate ladder with citations as a score component (t08); skills
#      auto-creation and .stella/memories/*.md are explicitly untouched in v1.
#   D2 no renames of existing context.db columns (recorded_at / valid_to
#      stay); the 13 NEW lifecycle tables use observed_at / valid_from /
#      valid_until natively; serialization emits canonical names (t03).
#   D3 frames compile ONCE per pipeline run through the existing
#      ContextRecallPort seam — never per tool call (t09, t10).
#   D4 advisory (inferred, unconfirmed) directives never touch
#      .stella/rules/*.md; materialization requires explicit Keep. The
#      settings key is `advisory_at_confidence`, not the RFC's
#      `auto_publish_at_confidence` (t05, t08).
#   D5 v1 contract requirement kinds are the deterministic file-shape set
#      only: file_exists, directory_exists, glob_min_count, file_size,
#      markdown_sections, mime_by_extension. `command`, `semantic_judge`,
#      `json_schema`, `image_dimensions` deferred. Contract matching is
#      EXPLICIT (flag/config slug), not inferred intent (t01, t11, t12).
#   D6 retention/pruning exempts any observation or evidence referenced by a
#      live candidate, directive, promotion, or citation (t03).
#   D7 solo mode only; team/regulated parse but return typed
#      NotYetSupported (t02, t05).
#
# Record-type placement (differs from RFC §16.1, follows AGENTS.md): pure
# serde record types -> stella-protocol ("shared types crossing a crate
# boundary"); decision logic -> stella-core; storage + frame compiler ->
# stella-context; orchestration/I-O -> stella-cli. New dependency edge:
# stella-context -> stella-protocol (acyclic: protocol <- core <- pipeline,
# protocol <- context <- cli).
# ============================================================================

# ---------------------------------------------------------------------------
# Phase 0 — record vocabulary, events, schema
# ---------------------------------------------------------------------------

[[tasks]]
id = "t01-protocol-records"
title = "Lifecycle record types + additive events in stella-protocol"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC.
First read docs/design/adaptive-context.md sections 6-9 and 16.4, and AGENTS.md
(conventions are binding: typed errors, no unwrap/expect on runtime data, serde
round-trip tests for every shared type, new .rs files <= 1500 lines, no new
dependencies, rustfmt + clippy -D warnings clean).

Deliver, in stella-protocol (types only — zero logic, zero I/O):

1. A new module stella-protocol/src/context_lifecycle.rs (split into
   submodules if it would exceed the 1500-line ratchet) with serde types for
   the RFC's record vocabulary, all `#[serde(rename_all = "snake_case")]`:
   Scope (8 optional ids, RFC 8.1); SharingScope (personal/repository/
   organization); Sensitivity; Observation + ObservationKind (open, namespaced
   — a newtype over String with associated consts for the 15 kinds in RFC
   8.2); Evidence with locator + content_hash + bounded excerpt (RFC 8.4);
   Directive with kind/priority/source/status/promotion_stage/enforcement
   enums exactly per RFC 8.3; CandidateDirective (RFC 8.5); CitationEvent +
   CitationHealth (RFC 8.6); ArtifactContract + Requirement (RFC 8.7) with
   requirement kinds LIMITED to: file_exists, directory_exists,
   glob_min_count, file_size, markdown_sections, mime_by_extension — the
   other RFC kinds (json_schema, command, semantic_judge, image_dimensions)
   are deliberately deferred, note this in the doc comment; ContractValidation
   + RequirementResult (RFC 8.8); OutcomeAssessment + AssessmentLevel (RFC
   8.9); CompiledFrameManifest + frame item refs (RFC 9.1 manifest shape).
   Name the aggregate frame type CompiledContextFrame — the plain
   ContextFrame name is taken by the retrieval protocol (RFC 6.6).
   Common-schema rules from RFC section 7: every durable record carries
   schema_version, a stable id, scope, sharing_scope, observed_at /
   valid_from / valid_until (Option<String>, RFC-3339), status, and an
   idempotency or content-hash field. Confidence is an integer clamped to
   0..=100 — enforce via constructor or a deserialize-time check with a
   typed error, and property-test the bound.

2. Additive AgentEvent variants in stella-protocol/src/event.rs, following
   that file's additive-only discipline (serde(default) on every optional
   field, snake_case tag, never a rename): ObservationRecorded,
   CandidateDirectiveCreated, DirectivePromoted, DirectiveSuperseded,
   DirectiveFeedbackRecorded, ContextFrameCompiled, ArtifactContractMatched,
   ContractValidationCompleted, OutcomeAssessed — each carrying stable ids
   and small scalar fields only, never embedded record payloads (RFC 16.4).
   Also add an AdvisoryNotice event (candidate_id, statement, distinct_task
   count, scope label) for the TUI's Keep/Edit/Ignore card; the input-side
   decision enum belongs to the TUI/CLI, not here.

3. Tests, matching the file's existing style: serde round-trip for every new
   type and event variant; a property test that serialized keys are lowercase
   snake_case; legacy-tolerance tests proving old event lines still parse.

Run: cargo test -p stella-protocol && cargo fmt && cargo clippy -p
stella-protocol --all-targets -- -D warnings.
Commit with the repo_commit tool: "feat(stella-protocol): context lifecycle
record types + additive lifecycle events", body listing the deferred
requirement kinds. If part of this already exists from a prior fleet attempt,
reconcile and complete it — never duplicate types.
'''
depends_on = []
claims = [
  "stella-protocol/src/lib.rs",
  "stella-protocol/src/event.rs",
  "stella-protocol/src/context_lifecycle.rs",
]

[[tasks]]
id = "t02-core-policy"
title = "Governance, scoring, precedence + rule frontmatter aliases in stella-core"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read sections 9.3, 10.4, 10.5, 11, 13, and
16.1, plus AGENTS.md; its invariants are binding, especially: stella-core does
NO filesystem/network/SQLite I/O — pure decision logic over owned data,
property-testable; typed errors; no new dependencies; files <= 1500 lines).

The record types you consume were added by an earlier task in
stella-protocol/src/context_lifecycle.rs (already committed in your tree —
build on them; if absent, stop and report the gap in your summary).

Deliver, in a new module tree stella-core/src/lifecycle/ (mod.rs plus focused
submodules):

1. Governance: GovernanceMode (Solo | Team | Regulated) + typed config
   mirroring RFC 11.1 but with the key `advisory_at_confidence` (deliberate
   rename of the RFC's `auto_publish_at_confidence`; doc-comment why:
   "publish" is reserved for explicit rule-file materialization). Team and
   Regulated return a typed NotYetSupported error from every decision entry
   point — no dead policy scaffolding.
2. The solo promotion ladder (RFC 11.2): candidate eligibility (>= configured
   distinct tasks/episodes — repeated events inside ONE task can never
   satisfy the count, RFC 8.5), advisory activation, Keep/Edit/Ignore
   transitions (Edit = superseding user-authored directive preserving
   evidence; Ignore = rejected + re-proposal cooldown + negative evidence),
   supersession that always preserves the prior record.
3. Candidate scoring per RFC 10.4 with STORED, VERSIONED score components
   (so old candidates can be recomputed and explained). Include a
   citation-health component so the existing `stella memory promote`
   citation ladder can delegate here later.
4. Contradiction detection between observations/candidates, and
   conflicts-as-data types.
5. Frame precedence (RFC 9.3) as a pure deterministic comparator: the 8-level
   authority order, specific-scope-over-broad at equal authority, newer wins
   only via explicit supersession, preference never overrides constraint.
   Conflict records are emitted, never silently merged.
6. Lifecycle decisions (RFC 13.3-13.4): staleness, expiry, archival
   eligibility (evaluated_count >= 5 and not_helpful ratio >= 0.80),
   never-archive exclusions (system/critical/blocking/organization/pinned/
   hold), and a reference-exemption input so pruning can never orphan a
   promoted directive's evidence chain.
7. Invariant checks as pure functions + proptest coverage for each RFC 20.1
   bullet that is pure logic: inferred never becomes blocking without
   confirmation; personal never publishes to repository; scope never widens
   implicitly; conflict resolution is deterministic; one task cannot
   fabricate the distinct-task minimum.

Also, in stella-core/src/rules.rs: extend the hand-rolled frontmatter parser
(parse_frontmatter / guard_from) to ACCEPT canonical snake_case aliases
guard_tool / guard_deny_path / guard_deny_command alongside the legacy
hyphenated keys, plus the new optional directive-metadata keys from RFC 12
(kind, sharing_scope, promotion_stage, enforcement, confidence, observed_at,
valid_from, evidence_ids). render_rule_markdown emits canonical snake_case
keys for newly generated files. Witness test: an existing legacy-keyed rule
file parses byte-identically to before (this test must fail if aliases are
removed). Reuse the pub(crate) helpers in stella-core/src/mining.rs
(terms/jaccard/cluster_observations/hash8/slugify) for candidate clustering
over typed observations — note rules::mine_candidates already exists,
fully tested and UNWIRED; extend/adapt it rather than writing a second miner.

Run: cargo test -p stella-core && cargo fmt && cargo clippy -p stella-core
--all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-core): adaptive-context governance,
scoring, precedence + rule frontmatter aliases". Reconcile with any
already-landed partial work instead of duplicating.
'''
depends_on = ["t01-protocol-records"]
claims = [
  "stella-core/src/lib.rs",
  "stella-core/src/rules.rs",
  "stella-core/src/mining.rs",
]

[[tasks]]
id = "t03-context-schema"
title = "Lifecycle schema v4 + typed repositories + as-of queries in stella-context"
prompt = '''
You are one task in a fleet implementing the Adaptive Context Lifecycle RFC
(docs/design/adaptive-context.md — read sections 5.1, 7, 8, and 15, plus
AGENTS.md; binding: typed errors, no unwrap on runtime data, no new deps
beyond what is stated below, new files <= 1500 lines, rustfmt/clippy clean).

Context you must respect: stella-context/src/store.rs is pinned by the
file-size ratchet — keep its diff to the minimum needed to register a new
migration; all new DDL/repository code goes in NEW modules. The existing
schema is hand-rolled SQL consts versioned via PRAGMA user_version
(SCHEMA_VERSION = 3, migrate() applies pending migrations in one
transaction — follow that exact pattern). Record types come from
stella-protocol/src/context_lifecycle.rs (committed earlier); add
`stella-protocol = { path = "../stella-protocol" }` to
stella-context/Cargo.toml — a deliberate new intra-workspace edge (protocol
is the shared-types crate); justify it in the commit body.

Deliver:

1. Migration V4 (SCHEMA_VERSION 3 -> 4) adding the RFC 15.1 tables:
   observation, directive, directive_evidence, candidate_directive,
   candidate_observation, citation_event, promotion_event, artifact_contract,
   contract_validation, outcome_assessment, compiled_context_frame,
   compiled_context_frame_item, extraction_cursor — with canonical temporal
   columns observed_at / valid_from / valid_until NATIVELY, plus the
   RFC section 7 common fields (schema_version, scope columns, sharing_scope,
   status, confidence INTEGER 0-100, idempotency_key with a UNIQUE index
   where records replay). DO NOT rename the existing node/edge/embedding/
   episode/memory columns — recorded_at and valid_to stay as-is in v1
   (decision D2 in the plan header); document the recorded_at<->observed_at
   mapping in the module doc instead. Put DDL in a new module (e.g.
   lifecycle_schema.rs) referenced from migrate().
2. Typed repositories in new modules (e.g. lifecycle_store.rs /
   lifecycle_queries.rs), using the crate's existing rusqlite + injected
   Clock idioms: idempotent observation append (replaying the same
   idempotency_key is a no-op); evidence with bounded excerpt +
   content_hash; candidate CRUD + candidate_observation links; directive
   CRUD + directive_evidence + supersession that PRESERVES prior rows
   (append-only status transitions); promotion_event append; citation_event
   append with health aggregates DERIVED by query, never a mutable counter
   (RFC 8.6); artifact_contract + contract_validation storage;
   compiled_context_frame + _item persistence, immutable once written (late
   feedback appends, never mutates — RFC 15.4); extraction_cursor get/set
   per source.
3. As-of reads over lifecycle records honoring as_of_observed_at and
   as_of_valid_at (RFC section 7 semantics: absent valid_from means
   valid-from-observed_at; absent valid_until means open interval).
4. Memory unification (decision D1): migrate existing `memory` table rows
   into directives with kind=memory inside the V4 transaction (stable
   mapping from public_id; zero data loss; keep the memory table and the
   Memory graph-node mirror intact as the retrieval surface, with the
   directive row referencing the node id). Existing recall behavior must be
   unchanged — prove with a test.
5. Retention execution: apply pruning decisions passed in from core policy,
   with reference-exemption enforced in SQL — never delete an observation or
   evidence row referenced by a live candidate, directive, promotion_event,
   or citation_event (decision D6). Property/integration test: pruning never
   orphans a promoted directive's evidence chain.
6. Migration tests per RFC 20.2: a fixture v3 database migrates losslessly;
   PRAGMA integrity_check passes post-migration; an interrupted migration
   rolls back (transaction atomicity); memory/fact recall is equivalent
   before and after.

Run: cargo test -p stella-context && cargo fmt && cargo clippy -p
stella-context --all-targets -- -D warnings.
Commit via repo_commit: "feat(stella-context): lifecycle schema v4, typed
repositories, as-of queries". Reconcile with already-landed work rather than
duplicating.
'''
depends_on = ["t01-protocol-records"]
claims = [
  "stella-context/src/lib.rs",
  "stella-context/src/store.rs",
  "stella-context/Cargo.toml",
]

